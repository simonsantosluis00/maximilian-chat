<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maximilian</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        #header { padding: 20px; background: #16213e; text-align: center; font-size: 24px; font-weight: bold; color: #e94560; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .mensaje { max-width: 70%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; }
        .usuario { background: #e94560; align-self: flex-end; border-radius: 18px 18px 4px 18px; }
        .bot { background: #16213e; align-self: flex-start; border-radius: 18px 18px 18px 4px; }
        #input-area { display: flex; padding: 16px; background: #16213e; gap: 10px; }
        #input { flex: 1; padding: 12px 16px; border-radius: 24px; border: none; background: #0f3460; color: #eee; font-size: 16px; outline: none; }
        #btn { padding: 12px 24px; background: #e94560; color: white; border: none; border-radius: 24px; cursor: pointer; font-size: 16px; }
        #btn:hover { background: #c73652; }
    </style>
</head>
<body>
    <div id="header">🎩 Maximilian</div>
    <div id="chat"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="Escríbele a Maximilian..." />
        <button id="btn">Enviar</button>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const input = document.getElementById("input");
        const btn = document.getElementById("btn");

        function agregarMensaje(texto, tipo) {
            const div = document.createElement("div");
            div.className = `mensaje ${tipo}`;
            div.innerText = texto;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function enviar() {
            const texto = input.value.trim();
            if (!texto) return;
            agregarMensaje(texto, "usuario");
            input.value = "";
            agregarMensaje("...", "bot");

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mensaje: texto })
            });

            const data = await res.json();
            chat.lastChild.remove();
            agregarMensaje(data.respuesta, "bot");
        }

        btn.addEventListener("click", enviar);
        input.addEventListener("keypress", e => { if (e.key === "Enter") enviar(); });
    </script>
</body>
</html>
