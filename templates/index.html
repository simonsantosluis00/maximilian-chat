<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Clientes</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px; }
        h1 { margin-bottom: 30px; color: #333; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 220px; text-decoration: none; color: #333; }
        .card:hover { transform: translateY(-4px); transition: 0.2s; }
        .card h2 { font-size: 18px; margin-bottom: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>
    <h1>🤖 Mis Clientes</h1>
    <div class="grid">
        {% for id, cliente in clientes.items() %}
        <a class="card" href="/chat/{{ id }}">
            <span class="dot" style="background: {{ cliente.color }}"></span>
            <h2>{{ cliente.nombre }}</h2>
            <p style="color:#888; font-size:14px;">Ver chatbot →</p>
        </a>
        {% endfor %}
    </div>
</body>
</html>
